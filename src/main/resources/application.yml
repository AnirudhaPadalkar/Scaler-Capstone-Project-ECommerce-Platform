spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ecomm
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme-min-32-chars-long-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}   # 7 days

logging:
  level:
    com.example.ecomm: INFO
    org.springframework.security: WARN
