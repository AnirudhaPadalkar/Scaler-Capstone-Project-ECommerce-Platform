spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ecomm
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme-min-32-chars-long-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  mail:
    from: ${MAIL_FROM:noreply@ecomm.com}
    base-url: ${APP_BASE_URL:http://localhost:8080}
  password-reset:
    expiration-minutes: ${PASSWORD_RESET_EXPIRY_MIN:30}

logging:
  level:
    com.example.ecomm: INFO
    org.springframework.security: WARN
